input {
  beats {
    port => 5044
  }
}

filter {
  # Filebeat (json.keys_under_root: true, message_key: "message") already decodes each
  # JSON log line from LogstashEncoder and promotes its fields (message, level, service,
  # instance, logger_name, thread_name, ...) to the top level of the event — no JSON
  # re-parsing needed here.

  # BackendStatsReporter emits "type=metrics received_tps=.. inserted_tps=.. ..." once a
  # second per replica. Parse it into numeric fields so Kibana can chart TPS over time.
  if [message] and [message] =~ /^type=metrics/ {
    kv {
      source => "message"
      field_split => " "
      value_split => "="
      target => "metrics"
    }
    mutate {
      convert => {
        "[metrics][received_tps]"    => "integer"
        "[metrics][inserted_tps]"    => "integer"
        "[metrics][dropped_tps]"     => "integer"
        "[metrics][total_received]"  => "integer"
        "[metrics][total_inserted]"  => "integer"
        "[metrics][total_dropped]"   => "integer"
        "[metrics][total_failed]"    => "integer"
        "[metrics][queue_size]"      => "integer"
        "[metrics][queue_capacity]"  => "integer"
        "[metrics][queue_fill_pct]"  => "float"
        "[metrics][jvm_used_mb]"     => "integer"
        "[metrics][jvm_max_mb]"      => "integer"
      }
    }
  }

  # LogController emits "type=request method=.. path=.. batch_size=.. status=.. ..." for
  # every POST /api/logs call. Parse it so Kibana can show request volume/latency per
  # replica (via the top-level "instance" field already set by logback).
  if [message] and [message] =~ /^type=request/ {
    kv {
      source => "message"
      field_split => " "
      value_split => "="
      target => "request"
    }
    mutate {
      convert => {
        "[request][batch_size]"  => "integer"
        "[request][accepted]"    => "integer"
        "[request][dropped]"     => "integer"
        "[request][status]"      => "integer"
        "[request][duration_ms]" => "integer"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "log-backend-%{+yyyy.MM.dd}"
  }
}
