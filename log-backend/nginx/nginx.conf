# Rate limit, keyed per client IP: caps how fast any single producer can push
# requests, applied once at the edge before traffic reaches any backend replica.
limit_req_zone $binary_remote_addr zone=log_api:10m rate=600r/s;

upstream log_backend {
    server log-backend-1:8081;
    server log-backend-2:8081;
    server log-backend-3:8081;
}

server {
    listen 8081;

    # Reject oversized request bodies at the edge, before they reach the app.
    client_max_body_size 2m;

    # Return 429 (not the nginx default 503) so it's distinguishable from a
    # genuinely unavailable backend.
    limit_req_status 429;

    location / {
        # burst=200: absorb short spikes above the sustained rate instead of
        # rejecting them immediately; nodelay serves burst requests right away
        # rather than queuing/delaying them.
        limit_req zone=log_api burst=200 nodelay;

        proxy_pass http://log_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
