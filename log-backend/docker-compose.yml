services:

  # ── Application (3 stateless replicas behind an LB) ─────────────────────────
  log-backend-1: &log-backend
    build: .
    container_name: log-backend-1
    environment:
      - LOG_FILE=app-1
      - ES_HOST=elasticsearch
    expose:
      - "8081"
    volumes:
      # Share the log directory with Filebeat
      - logs_data:/app/logs
    networks:
      - elk
    depends_on:
      - logstash
      - elasticsearch

  log-backend-2:
    <<: *log-backend
    container_name: log-backend-2
    environment:
      - LOG_FILE=app-2
      - ES_HOST=elasticsearch

  log-backend-3:
    <<: *log-backend
    container_name: log-backend-3
    environment:
      - LOG_FILE=app-3
      - ES_HOST=elasticsearch

  log-backend-lb:
    image: nginx:1.27-alpine
    container_name: log-backend-lb
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - log-backend-1
      - log-backend-2
      - log-backend-3
    networks:
      - elk

  # ── ELK Stack ──────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.3
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elk

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
    container_name: filebeat
    user: root
    # --strict.perms=false: required on Windows/WSL where bind-mounted files have 777 permissions
    command: filebeat -e --strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - logs_data:/logs:ro
    depends_on:
      - logstash
    networks:
      - elk

volumes:
  es_data:
  logs_data:

networks:
  elk:
    driver: bridge
