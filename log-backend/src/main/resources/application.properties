
spring.application.name=log-backend
spring.main.banner-mode=off
server.port=8081

# Elasticsearch — ES_HOST defaults to localhost for local/IDE runs,
# overridden to the "elasticsearch" service name in docker-compose.
log.consumer.es-host=${ES_HOST:localhost}
log.consumer.es-port=${ES_PORT:9200}

# Postgres — system of record. PG_HOST defaults to localhost for local/IDE runs,
# overridden to the "postgres" service name in docker-compose.
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:logs}
spring.datasource.username=${PG_USER:logs}
spring.datasource.password=${PG_PASSWORD:logs}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always

# Consumer config
log.consumer.queue-capacity=500000
log.consumer.batch-size=500
log.consumer.consumer-threads=4
log.consumer.max-retries=3
log.consumer.initial-backoff-ms=100
log.consumer.max-batch-size=5000

# Logging levels are configured in logback-spring.xml